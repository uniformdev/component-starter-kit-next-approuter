        text:
          type: text
          locales:
            en: >-
              At North Park University, we encourage your professional success
              with a values-based education. You’ll learn from accessible
              faculty who ensure you have what you need to meet your career
              goals. Our vibrant community offers an education rooted in
              Christian faith, small class sizes, and expert professors ready to
              mentor you. North Park embraces and values all people and
              celebrates the global cultural tapestry that is reflected on our
              campus. With multiple start dates, it’s always a good time to
              apply.
