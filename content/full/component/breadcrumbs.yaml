# yaml-language-server: $schema=https://uniform.app/schemas/json-schema/component-definition/v1.json
$schema: https://uniform.app/schemas/json-schema/component-definition/v1.json
id: breadcrumbs
name: Breadcrumbs
icon: list-tree
parameters:
  - id: displayName
    name: Display Name
    type: text
    guidance: Used as a display name for the canvas; not rendered in the markup.
    typeConfig: null
    localizable: true
  - id: separator
    name: Separator
    type: dex-segmented-control-parameter
    guidance: Use the Separator parameter to set up separator between breadcrumb links.
    typeConfig:
      options:
        - key: Chevron
          value: chevron
        - key: Slash
          value: slash
      defaultValue: chevron
  - id: links
    name: Links
    type: $block
    typeConfig:
      allowedTypes:
        - breadcrumbLink
  - id: autoGenerate
    name: Auto Generate
    type: checkbox
    guidance: >-
      Use the Auto Generate parameter to automatically create breadcrumbs
      derived from the project’s map structure, ensuring navigation updates
      dynamically as the project hierarchy changes.
    helpText: >-
      Enables automatic breadcrumb generation based on the project’s map
      structure
    typeConfig: null
  - id: 4fa3aa01-1d60-4c4d-ace3-c68c833126b3
    name: Presentation Settings
    type: group
    typeConfig:
      collapsed: true
      childrenParams:
        - size
        - color
        - font
        - transform
  - id: size
    name: Size
    type: dex-segmented-control-parameter
    guidance: Use the Size parameter to control the font size.
    typeConfig:
      options:
        - key: XS
          value: xs
        - key: SM
          value: sm
        - key: Base
          value: base
        - key: LG
          value: lg
        - key: XL
          value: xl
        - key: 2XL
          value: 2xl
        - key: 3XL
          value: 3xl
        - key: 4XL
          value: 4xl
        - key: 5XL
          value: 5xl
        - key: 6XL
          value: 6xl
        - key: 7XL
          value: 7xl
      withViewPort: false
  - id: color
    name: Color
    type: dex-color-palette-parameter
    guidance: Use the Color parameter to control the text color.
    typeConfig:
      allowColors: []
      selectedGroup: text
      allowThemeColors: []
  - id: font
    name: Font
    type: dex-token-selector-parameter
    guidance: Use the Font parameter to control the font family.
    typeConfig:
      selectedTokenType: font
  - id: transform
    name: Transform
    type: dex-segmented-control-parameter
    guidance: Use the Transform parameter to control the capitalization of text.
    typeConfig:
      options:
        - key: Uppercase
          value: uppercase
        - key: Lowercase
          value: lowercase
        - key: Capitalize
          value: capitalize
categoryId: 70d03350-bbf9-457d-abc0-cf7d7aa2a3a4
previewImageUrl: >-
  https://res.cloudinary.com/uniform-demos/image/upload/csk-v-next/baseline/preview-images/breadcrumbs-chevron.jpg
useTeamPermissions: true
slots: []
titleParameter: displayName
canBeComposition: false
created: '2025-01-29T10:47:01.144155+00:00'
updated: '2025-10-06T21:18:48.154415+00:00'
